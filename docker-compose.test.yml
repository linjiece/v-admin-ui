
services:
  web-ele:
    build:
      context: .
      dockerfile: Dockerfile.web-ele
      args:
        - NODE_ENV=test
    container_name: vben-web-ele-test
    ports:
      - "8081:8080"
    environment:
      - TZ=Asia/Shanghai
      - NODE_ENV=test
      - VITE_GLOB_API_URL=/api
      - VITE_GLOB_APP_TITLE=VBEN Admin Test
    volumes:
      - ./logs/test/nginx:/var/log/nginx:rw
      - ./test-data:/app/data:rw
    networks:
      - v-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.8'
          memory: 768M
        reservations:
          cpus: '0.4'
          memory: 384M
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 测试数据库（可选）
  postgres-test:
    image: postgres:15-alpine
    container_name: vben-postgres-test
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=vben_test
      - POSTGRES_USER=vben_user
      - POSTGRES_PASSWORD=vben_password
    volumes:
      - postgres-test-data:/var/lib/postgresql/data
    networks:
      - v-network
    restart: unless-stopped
    profiles:
      - with-db

  # Redis缓存（可选）
  redis-test:
    image: redis:7-alpine
    container_name: vben-redis-test
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-test-data:/data
    networks:
      - v-network
    restart: unless-stopped
    profiles:
      - with-cache

  # Nginx反向代理（测试环境）
  nginx-proxy-test:
    image: nginx:stable-alpine
    container_name: vben-nginx-proxy-test
    ports:
      - "8082:80"
    volumes:
      - ./nginx-proxy-test.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web-ele
    networks:
      - v-network
    restart: unless-stopped
    profiles:
      - with-proxy

networks:
  v-network:
    external: true
    name: v-network

volumes:
  postgres-test-data:
    driver: local
  redis-test-data:
    driver: local
